<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eiken Speech Trainer - Read Aloud Trial</title>
<style>
  :root{
    --bg:#eef7ff;
    --card:#ffffff;
    --text:#17365d;
    --muted:#667789;
    --border:#d7e5f2;
    --blue:#0875ee;
    --green:#06c95b;
    --orange:#ff9f1c;
    --purple:#7b61ff;
    --pale:#d9ecff;
    --star:#f5b301;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
  }
  main{
    max-width:820px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  h1{
    margin:0 0 18px;
    font-size:1.95rem;
    line-height:1.15;
    color:#075fc7;
    font-weight:850;
    white-space:nowrap;
  }
  .subtitle{
    color:var(--muted);
    font-size:1.02rem;
    margin-bottom:22px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:22px;
    margin:16px 0;
    box-shadow:0 2px 10px rgba(36,80,120,.06);
  }
  h2{ margin:0; font-size:1.35rem; }
  .screen-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .back-mini{
    flex:0 0 auto;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    border-radius:999px;
    padding:8px 12px;
    font-weight:800;
    font-size:.95rem;
    cursor:pointer;
  }
  .desc{
    color:var(--muted);
    font-size:1rem;
    margin-bottom:16px;
  }
  .big-btn{
    width:100%;
    border:0;
    border-radius:22px;
    padding:17px 16px;
    margin:9px 0;
    font-size:1.12rem;
    font-weight:800;
    cursor:pointer;
  }
  .blue{background:var(--blue); color:white;}
  .green{background:var(--green); color:white;}
  .orange{background:var(--orange); color:white;}
  .purple{background:var(--purple); color:white;}
  .pale{background:var(--pale); color:#075fc7;}
  .white{
    background:white;
    color:var(--text);
    border:1px solid var(--border);
  }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }

  .stance-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:12px 0;
  }
  .stance-btn{
    border:1px solid var(--border);
    border-radius:18px;
    padding:12px 10px;
    font-size:1rem;
    font-weight:900;
    cursor:pointer;
  }

  .half{flex:1 1 140px;}
  .selected{
    outline:4px solid rgba(8,117,238,.22);
    transform:translateY(-1px);
  }
  .small{ color:var(--muted); font-size:.9rem; }
  select{
    width:100%;
    padding:14px;
    border-radius:16px;
    border:1px solid var(--border);
    background:white;
    font-size:1rem;
    color:var(--text);
    margin:8px 0 12px;
  }
  .topic-box{
    background:#f7fbff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
    margin:10px 0;
  }
  .topic-title{ font-weight:800; font-size:1.05rem; }
  .meta{color:var(--muted); font-size:.9rem;}
  .mode-switch{
    display:flex;
    gap:7px;
    margin:12px 0;
  }
  .mode-switch button{
    flex:1;
    border:1px solid var(--border);
    border-radius:15px;
    padding:10px 5px;
    font-size:.92rem;
    font-weight:800;
    cursor:pointer;
    background:#fff;
    color:var(--text);
  }
  .mode-switch button.active{
    background:var(--pale);
    color:#075fc7;
    outline:3px solid rgba(8,117,238,.16);
  }
  .line-card{
    border:1px solid var(--border);
    border-radius:20px;
    padding:15px;
    margin:12px 0;
    background:#fff;
  }
  .ja{font-weight:700; color:#253b53;}
  .en{margin-top:8px; color:#111; font-size:1.02rem;}
  .hidden-answer{display:none;}
  .star{
    border:1px solid var(--border);
    background:white;
    border-radius:16px;
    padding:7px 11px;
    font-size:1.1rem;
    cursor:pointer;
  }
  .star.on{
    background:#fff4c2;
    border-color:var(--star);
  }
  .topline{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .phase-panel{display:none;}
  .phase-panel.active{display:block;}
  .speech-card{
    background:#f8fcff;
    border:1px solid var(--border);
    border-radius:22px;
    padding:18px;
    margin:14px 0;
    min-height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:12px;
  }
  .cue-label{
    display:inline-block;
    width:max-content;
    background:var(--pale);
    color:#075fc7;
    font-weight:850;
    border-radius:999px;
    padding:4px 10px;
    font-size:.82rem;
  }
  .cue-main{
    color:#111;
    font-size:1.14rem;
    font-weight:800;
    line-height:1.45;
  }
  .answer-preview{
    color:#3f5163;
    border-left:4px solid var(--border);
    padding-left:12px;
    font-size:1.04rem;
    font-weight:650;
    line-height:1.55;
  }
  .speech-actions{
    display:grid;
    grid-template-columns:76px 1fr;
    gap:10px;
    align-items:stretch;
  }
  .speech-actions .star{ height:58px; }
  .next-compact{
    border:0;
    border-radius:20px;
    background:var(--green);
    color:white;
    font-size:1.2rem;
    font-weight:900;
    cursor:pointer;
  }
  .restart-compact{
    width:100%;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    border-radius:20px;
    padding:13px 10px;
    margin-top:10px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
  }
  .read-controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:12px 0;
  }
  .read-controls button, .read-line button, .speed-row button{
    border:1px solid var(--border);
    border-radius:18px;
    padding:12px 10px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    background:#fff;
    color:var(--text);
  }
  .read-controls .play-all{
    background:var(--orange);
    color:#fff;
    border-color:var(--orange);
  }
  .read-controls .stop{
    background:#fff;
    color:#b00020;
  }
  .speed-row{
    display:flex;
    gap:8px;
    margin:10px 0 16px;
  }
  .speed-row button{ flex:1; padding:9px 6px; font-size:.9rem; }
  .speed-row button.active{
    background:var(--pale);
    color:#075fc7;
    outline:3px solid rgba(8,117,238,.16);
  }
  .read-line{
    border:1px solid var(--border);
    background:#fff;
    border-radius:20px;
    padding:15px;
    margin:12px 0;
  }
  .read-line.active{
    outline:4px solid rgba(255,159,28,.22);
    border-color:#ffc26d;
  }
  .read-en{
    color:#111;
    font-size:1.13rem;
    font-weight:700;
    line-height:1.55;
    margin-bottom:10px;
  }
  .read-line button{
    width:100%;
    background:#f7fbff;
  }

  .exam-box{
    background:#f8fcff;
    border:1px solid var(--border);
    border-radius:22px;
    padding:18px;
    text-align:center;
    margin:14px 0;
  }
  .timer{
    font-size:3rem;
    font-weight:900;
    color:#111;
    line-height:1.2;
  }

  .finish{
    text-align:center;
    font-size:1.25rem;
    font-weight:900;
    padding:20px 0;
  }
  textarea{
    width:100%;
    min-height:160px;
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px;
    font-size:.9rem;
  }
</style>
</head>
<body>
<main>
  <h1>Eiken Speech Trainer</h1>

  <section class="card" id="homeCard">
    

    <label class="small">Category</label>
    <select id="categorySelect" onchange="changeCategory()"></select>

    <label class="small">Topic</label>
    <select id="topicSelect" onchange="changeTopic()"></select>

    <div class="topic-box">
      <div class="topic-title" id="currentTopic"></div>
      <div class="meta" id="currentMeta"></div>
    </div>

    <div class="stance-row">
      <button id="yesBtn" class="stance-btn white" onclick="setStance('Yes')">YES</button>
      <button id="noBtn" class="stance-btn white" onclick="setStance('No')">NO</button>
    </div>

    <button class="big-btn blue" onclick="setPhase('compose')">① 全文英作文・暗記</button>
    <button class="big-btn green" onclick="setPhase('speech')">② スピーチ確認</button>
    <button class="big-btn orange" onclick="setPhase('read')">③ 通し音読</button>
    <button class="big-btn purple" onclick="setPhase('exam')">④ 本番スピーチ録音</button>
    <button class="big-btn pale" onclick="setPhase('review')">⭐ 復習ラインだけ</button>

    
  </section>

  <section class="card phase-panel" id="composePanel">
    <div class="screen-head">
      <button class="back-mini" onclick="setPhase('home')">← 戻る</button>
      <h2>① 全文英作文・暗記</h2>
    </div>

    <div class="mode-switch">
      <button id="jpBtn" class="active" onclick="setDisplayMode('jp')">JP→EN</button>
      <button id="enBtn" onclick="setDisplayMode('en')">EN only</button>
      <button id="bothBtn" onclick="setDisplayMode('both')">Both</button>
    </div>

    <p class="small">JP→ENではカードをタップすると英語が出ます。⭐で苦手行を登録できます。</p>
    <div id="composeList"></div>
  </section>

  <section class="card phase-panel" id="speechPanel">
    <div class="screen-head">
      <button class="back-mini" onclick="setPhase('home')">← 戻る</button>
      <h2>② スピーチ確認</h2>
    </div>

    <div class="meta" id="speechProgress"></div>
    <div class="speech-card" id="speechMain"></div>

    <div class="speech-actions">
      <button class="star" id="speechStar" onclick="toggleCurrentStar()">⭐</button>
      <button class="next-compact" id="nextBtn" onclick="nextLine()">Next</button>
    </div>
    <button class="restart-compact" onclick="restartSpeech()">Restart</button>
  </section>

  <section class="card phase-panel" id="readPanel">
    <div class="screen-head">
      <button class="back-mini" onclick="setPhase('home')">← 戻る</button>
      <h2>③ 通し音読</h2>
    </div>

    <div class="meta" id="readMeta"></div>

    <div class="read-controls">
      <button class="play-all" onclick="playAll()">▶ 全文再生</button>
      <button class="stop" onclick="stopSpeaking()">■ 停止</button>
    </div>

    <div class="speed-row">
      <button id="speed06" onclick="setRate(0.6)">0.6x</button>
      <button id="speed08" onclick="setRate(0.8)">0.8x</button>
      <button id="speed10" onclick="setRate(1.0)" class="active">1.0x</button>
    </div>

    <p class="small">英文だけを見ながら、音声にかぶせてシャドーイングできます。</p>
    <div id="readList"></div>
  </section>


  <section class="card phase-panel" id="examPanel">
    <div class="screen-head">
      <button class="back-mini" onclick="setPhase('home')">← 戻る</button>
      <h2>④ 本番スピーチ録音</h2>
    </div>

    <div class="meta" id="examMeta"></div>

    <div class="exam-box">
      <div class="timer" id="timer">02:00</div>
      <div class="small">英文・キューなしで2分間スピーチします。</div>
    </div>

    <div class="read-controls">
      <button class="play-all" id="recordBtn" onclick="startExamRecording()">● 録音開始</button>
      <button class="stop" onclick="stopExamRecording()">■ 停止</button>
    </div>

    <div class="read-controls">
      <button onclick="playRecording()">▶ 録音再生</button>
      <button class="stop" onclick="clearRecording()">録音削除</button>
    </div>

    <audio id="recordingAudio" controls style="width:100%; display:none; margin-top:12px;"></audio>

    <button class="restart-compact" onclick="resetTimer()">Timer Reset</button>
  </section>

  <section class="card phase-panel" id="reviewPanel">
    <div class="screen-head">
      <button class="back-mini" onclick="setPhase('home')">← 戻る</button>
      <h2>⭐ 復習ラインだけ</h2>
    </div>

    <p class="small">⭐を付けた行だけ表示します。もう覚えたら⭐を外せます。</p>
    <div id="reviewList"></div>
  </section>

  <section class="card">
    <details>
      <summary>Full speech text</summary>
      <textarea readonly id="fullText"></textarea>
    </details>
  </section>
</main>

<script>
const speeches = [
  {
    "id": "remote_work_yes",
    "topicId": "remote_work",
    "category": "Technology / Modern Society",
    "title": "Has the rise of remote work improved work-life balance?",
    "stance": "Yes",
    "lines": [
      {
        "cue": "主張",
        "hint": "YES：改善した",
        "ja": "リモートワークの普及はワークライフバランスを改善したと思います。",
        "en": "I agree with the statement that the rise of remote work has improved work-life balance."
      },
      {
        "cue": "導入",
        "hint": "理由は2つ",
        "ja": "理由は主に2つあります。",
        "en": "There are two main reasons for this."
      },
      {
        "cue": "理由1",
        "hint": "通勤時間を節約→私生活の時間が増える",
        "ja": "まず、リモートワークは通勤時間を節約できるので、私生活の時間が増えます。",
        "en": "Firstly, remote work saves commuting time, so people have more time for their personal lives."
      },
      {
        "cue": "具体例1",
        "hint": "家族と過ごす時間",
        "ja": "例えば、家族とより質の高い時間を過ごすことができます。",
        "en": "For example, they can spend more quality time with their families."
      },
      {
        "cue": "補足1",
        "hint": "都市部の通勤→ストレス軽減",
        "ja": "多くの都市では通勤に毎日何時間もかかるため、それをなくすことで、特に働く親のストレスを減らせます。",
        "en": "In many cities, commuting can take hours each day, so eliminating it can help reduce stress, especially for working parents."
      },
      {
        "cue": "理由2",
        "hint": "スケジュールの柔軟性",
        "ja": "次に、リモートワークはスケジュールにより柔軟性を与えます。",
        "en": "Secondly, remote work gives people more flexibility in their schedules."
      },
      {
        "cue": "説明2",
        "hint": "休憩・タスク管理→両立",
        "ja": "いつ休憩するか、どうタスクを管理するかを決められるため、仕事と私生活の責任のバランスを取りやすくなります。",
        "en": "They can decide when to take breaks and how to manage their tasks, which makes it easier to strike a balance between work and personal responsibilities."
      },
      {
        "cue": "具体例2",
        "hint": "子どもの世話",
        "ja": "例えば、親は子どもの世話をよりしやすくなります。",
        "en": "For example, parents can take better care of their children."
      },
      {
        "cue": "結論",
        "hint": "より良いワークライフバランス",
        "ja": "以上の理由から、リモートワークは多くの人がより良いワークライフバランスを実現する助けになっていると思います。",
        "en": "For these reasons, I believe that remote work has helped many people achieve a better work-life balance."
      }
    ]
  },
  {
    "id": "remote_work_no",
    "topicId": "remote_work",
    "category": "Technology / Modern Society",
    "title": "Has the rise of remote work improved work-life balance?",
    "stance": "No",
    "lines": [
      {
        "cue": "主張",
        "hint": "NO：改善していない",
        "ja": "リモートワークの普及がワークライフバランスを改善したとは思いません。",
        "en": "I disagree with the statement that the rise of remote work has improved work-life balance."
      },
      {
        "cue": "導入",
        "hint": "理由は2つ",
        "ja": "理由は主に2つあります。",
        "en": "There are two main reasons for this."
      },
      {
        "cue": "理由1",
        "hint": "仕事と私生活の境界が曖昧",
        "ja": "まず、リモートワークは仕事と私生活の境界を曖昧にします。",
        "en": "Firstly, remote work can blur the boundary between work and personal life."
      },
      {
        "cue": "説明1",
        "hint": "オフィス勤務は切り替えがある",
        "ja": "オフィスで働く場合、家と職場には明確な区切りがあり、退勤すれば仕事を置いて帰れます。",
        "en": "When you work in an office, there's a clear separation between your home and your workplace, and when you leave your office, you can leave your work behind."
      },
      {
        "cue": "対比",
        "hint": "在宅勤務は切り替えが難しい",
        "ja": "一方、自宅で働くと、仕事と私生活を切り離すのが難しくなります。",
        "en": "On the other hand, if people work from home, it becomes difficult to separate work from their private time."
      },
      {
        "cue": "結果1",
        "hint": "長時間労働・ストレス",
        "ja": "その結果、労働時間が長くなり、仕事関連のストレスを減らしにくくなるかもしれません。",
        "en": "As a result, people may end up working longer hours and experience work-related stress that is difficult to reduce."
      },
      {
        "cue": "理由2",
        "hint": "対面コミュニケーション減少",
        "ja": "次に、リモートワークは対面でのコミュニケーションを減らします。",
        "en": "Secondly, remote work reduces face-to-face communication."
      },
      {
        "cue": "説明2",
        "hint": "協力・チーム所属感が弱まる",
        "ja": "これにより、従業員が効果的に協力したり、チームに属している感覚を持ったりすることが難しくなります。",
        "en": "This can make it harder for employees to collaborate effectively and have a sense of belonging to a team."
      },
      {
        "cue": "結果2",
        "hint": "孤立・メンタルヘルス",
        "ja": "その結果、従業員は孤立を感じ、精神面に悪影響が出るかもしれません。",
        "en": "As a result, employees may feel isolated, which can negatively affect their mental health."
      },
      {
        "cue": "結論",
        "hint": "必ずしも改善していない",
        "ja": "以上の理由から、リモートワークは必ずしもワークライフバランスを改善したとは思いません。",
        "en": "For these reasons, I believe that remote work has not necessarily improved work-life balance."
      }
    ]
  },
  {
    "id": "ai_regulation_yes",
    "topicId": "ai_regulation",
    "category": "Technology / Modern Society",
    "title": "Should governments impose strict regulations on artificial intelligence development?",
    "stance": "Yes",
    "lines": [
      {
        "cue": "主張",
        "hint": "YES：AI開発に厳しい規制",
        "ja": "政府はAI開発に厳しい規制を課すべきだと思います。",
        "en": "I agree with the statement that governments should impose strict regulations on artificial intelligence development."
      },
      {
        "cue": "導入",
        "hint": "理由は2つ",
        "ja": "理由は主に2つあります。",
        "en": "There are two main reasons for this."
      },
      {
        "cue": "理由1",
        "hint": "社会・個人への悪影響",
        "ja": "まず、AIは社会と個人の両方に有害な影響を与える可能性があります。",
        "en": "Firstly, artificial intelligence may have harmful effects on both society and individuals."
      },
      {
        "cue": "具体例1",
        "hint": "プライバシー侵害",
        "ja": "例えば、プライバシー侵害につながる可能性があります。",
        "en": "For example, it could lead to invasions of privacy."
      },
      {
        "cue": "補足1",
        "hint": "個人データは取り戻せない",
        "ja": "一度AIツールに個人データを入力すると、それを取り戻す方法はありません。",
        "en": "Once people input their personal data into AI tools, there is no way to take it back."
      },
      {
        "cue": "具体例2",
        "hint": "雇用喪失",
        "ja": "もう一つの懸念は雇用喪失です。",
        "en": "Another concern is job displacement."
      },
      {
        "cue": "結果1",
        "hint": "失業率上昇",
        "ja": "これは失業率の上昇につながるかもしれません。",
        "en": "This may result in higher unemployment rates."
      },
      {
        "cue": "理由2",
        "hint": "AIの悪用",
        "ja": "次に、AIは悪用される可能性があります。",
        "en": "Secondly, AI can be misused."
      },
      {
        "cue": "具体例3",
        "hint": "誤情報の拡散",
        "ja": "例えば、誤情報の拡散はすでにSNS上で深刻な問題になっています。",
        "en": "For instance, spreading misinformation has already become a serious problem on social media."
      },
      {
        "cue": "補足2",

            "hint": "現代社会のニーズを重視",
            "ja": "したがって、現代社会のニーズを反映した慣習に焦点を当てることが重要です。",
            "en": "Therefore, it is important to focus on practices that reflect the needs of modern society."
        },
        {
            "cue": "結論",
            "hint": "必ずしも保存されるべきではない",
            "ja": "以上の理由から、伝統的な文化的慣習は必ずしも保存されるべきではないと思います。",
            "en": "For these reasons, I believe that traditional cultural practices should not necessarily be preserved."
        }
    ]
}
];

const categories = [
  "Technology / Modern Society",
  "Education",
  "Culture",
  "Government / Public Policy",
  "Society / Values",
  "Abstract Topics"
];

let category = "Technology / Modern Society";

let topicId = "remote_work";
let stance = "Yes";
let speech = getSpeech();
let displayMode = "jp";
let speechIndex = 0;
let previousAnswer = "";
let finished = false;
let stars = loadStars();
let rate = 1.0;
let currentReadIndex = -1;
let playQueue = [];
let timeLeft = 120;
let timerInterval = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingUrl = null;
let isPlayingAll = false;

function getSpeech(){
  return speeches.find(s => s.topicId === topicId && s.stance === stance) || speeches.find(s => s.topicId === topicId) || speeches[0];
}
function starKey(){ return "eikenSpeechStars_" + speech.id; }
function loadStars(){ return JSON.parse(localStorage.getItem(starKey()) || "{}"); }
function saveStars(){ localStorage.setItem(starKey(), JSON.stringify(stars)); }

function refreshSpeech(){
  stopSpeaking();
  speech = getSpeech();
  stars = loadStars();
  speechIndex = 0;
  previousAnswer = "";
  finished = false;
  currentReadIndex = -1;
  updateHeader();
  renderCompose();
  renderSpeech();
  renderRead();
  renderReview();
}

function initCategories(){
  const select = document.getElementById("categorySelect");
  select.innerHTML = categories.map(cat => {
    const count = new Set(speeches.filter(s => s.category === cat).map(s => s.topicId)).size;
    const label = count ? `${cat} (${count})` : `${cat} (0)`;
    return `<option value="${cat}">${label}</option>`;
  }).join("");
  select.value = category;
}

function initTopics(){
  const select = document.getElementById("topicSelect");
  const topics = [...new Map(speeches
    .filter(s => s.category === category)
    .map(s => [s.topicId, s.title])).entries()];

  if(topics.length === 0){
    select.innerHTML = `<option value="">No topics yet</option>`;
    select.disabled = true;
    document.getElementById("currentTopic").textContent = "No topics in this category yet";
    document.getElementById("currentMeta").textContent = `${category} / 0 topics`;
    return;
  }

  select.disabled = false;
  if(!topics.some(([id]) => id === topicId)) topicId = topics[0][0];
  select.innerHTML = topics.map(([id,title]) => `<option value="${id}">${title}</option>`).join("");
  select.value = topicId;
}

function changeCategory(){
  category = document.getElementById("categorySelect").value;
  const firstTopic = speeches.find(s => s.category === category);
  if(firstTopic){
    topicId = firstTopic.topicId;
    stance = "Yes";
    initTopics();
    refreshSpeech();
  }else{
    initTopics();
  }
}

function changeTopic(){
  topicId = document.getElementById("topicSelect").value;
  refreshSpeech();
}

function setStance(next){
  stance = next;
  refreshSpeech();
}

function updateHeader(){
  document.getElementById("currentTopic").textContent = speech.title;
  document.getElementById("currentMeta").textContent = `${speech.category} / ${speech.stance} / ${speech.lines.length} lines`;
  document.getElementById("yesBtn").classList.toggle("selected", stance === "Yes");
  document.getElementById("noBtn").classList.toggle("selected", stance === "No");
  document.getElementById("yesBtn").classList.toggle("blue", stance === "Yes");
  document.getElementById("yesBtn").classList.toggle("white", stance !== "Yes");
  document.getElementById("noBtn").classList.toggle("green", stance === "No");
  document.getElementById("noBtn").classList.toggle("white", stance !== "No");
  document.getElementById("fullText").value = speech.lines.map(l => l.en).join("\n");
}

function setPhase(phase){
  if(phase !== "read") stopSpeaking();
  if(phase !== "exam") stopTimer();
  document.getElementById("homeCard").style.display = phase === "home" ? "block" : "none";
  document.getElementById("composePanel").classList.toggle("active", phase === "compose");
  document.getElementById("speechPanel").classList.toggle("active", phase === "speech");
  document.getElementById("readPanel").classList.toggle("active", phase === "read");
  document.getElementById("examPanel").classList.toggle("active", phase === "exam");
  document.getElementById("reviewPanel").classList.toggle("active", phase === "review");
  window.scrollTo({top:0, behavior:"smooth"});
  if(phase === "compose") renderCompose();
  if(phase === "speech") renderSpeech();
  if(phase === "read") renderRead();
  if(phase === "exam") renderExam();
  if(phase === "review") renderReview();
}

function setDisplayMode(mode){
  displayMode = mode;
  document.getElementById("jpBtn").classList.toggle("active", mode === "jp");
  document.getElementById("enBtn").classList.toggle("active", mode === "en");
  document.getElementById("bothBtn").classList.toggle("active", mode === "both");
  renderCompose();
}

function toggleStar(i){
  stars[i] = !stars[i];
  if(!stars[i]) delete stars[i];
  saveStars();
  renderCompose();
  renderSpeech();
  renderReview();
}

function toggleCurrentStar(){
  if(finished) return;
  toggleStar(speechIndex);
}

function renderCompose(){
  const list = document.getElementById("composeList");
  list.innerHTML = "";
  speech.lines.forEach((line,i)=>{
    const card = document.createElement("div");
    card.className = "line-card";
    const starClass = stars[i] ? "star on" : "star";
    const commonTop = `
      <div class="topline">
        <div class="small">Line ${i+1} / ${line.cue}</div>
        <button class="${starClass}" onclick="event.stopPropagation(); toggleStar(${i})">⭐</button>
      </div>`;
    if(displayMode === "jp"){
      card.innerHTML = `${commonTop}<div class="ja">${line.ja}</div><div class="en hidden-answer">${line.en}</div><div class="small">Tap to reveal</div>`;
      card.onclick = ()=> card.querySelector(".en").classList.toggle("hidden-answer");
    }else if(displayMode === "en"){
      card.innerHTML = `${commonTop}<div class="en">${line.en}</div>`;
    }else{
      card.innerHTML = `${commonTop}<div class="ja">${line.ja}</div><div class="en">${line.en}</div>`;
    }
    list.appendChild(card);
  });
}

function renderSpeech(){
  const main = document.getElementById("speechMain");
  const progress = document.getElementById("speechProgress");
  const nextBtn = document.getElementById("nextBtn");
  const speechStar = document.getElementById("speechStar");

  if(finished){
    progress.textContent = "Finished";
    main.innerHTML = `
      <div class="answer-preview">${previousAnswer}</div>
      <div class="finish">Great work! Speech completed.</div>`;
    nextBtn.textContent = "Finish";
    nextBtn.onclick = () => setPhase("home");
    speechStar.className = "star";
    return;
  }

  const line = speech.lines[speechIndex];
  progress.textContent = `${speech.title} / ${speech.stance} / Line ${speechIndex+1} of ${speech.lines.length}`;
  main.innerHTML = `
    ${previousAnswer ? `<div class="answer-preview">${previousAnswer}</div>` : ""}
    <div class="cue-label">${line.cue}</div>
    <div class="cue-main">${line.hint}</div>`;
  nextBtn.textContent = speechIndex === speech.lines.length - 1 ? "Show Last Answer" : "Next";
  nextBtn.onclick = nextLine;
  speechStar.className = stars[speechIndex] ? "star on" : "star";
}

function nextLine(){
  if(finished){ setPhase("home"); return; }
  previousAnswer = speech.lines[speechIndex].en;
  if(speechIndex < speech.lines.length - 1){
    speechIndex++;
  }else{
    finished = true;
  }
  renderSpeech();
}

function restartSpeech(){
  speechIndex = 0;
  previousAnswer = "";
  finished = false;
  renderSpeech();
}

function renderReview(){
  const list = document.getElementById("reviewList");
  const starred = speech.lines.map((line,i)=>({...line,i})).filter(line=>stars[line.i]);
  if(starred.length === 0){
    list.innerHTML = `<div class="small">⭐付きの行はまだありません。</div>`;
    return;
  }
  list.innerHTML = "";
  starred.forEach(line=>{
    const card = document.createElement("div");
    card.className = "line-card";
    card.innerHTML = `
      <div class="topline">
        <div class="small">Line ${line.i+1} / ${line.cue}</div>
        <button class="star on" onclick="event.stopPropagation(); toggleStar(${line.i})">⭐</button>
      </div>
      <div class="ja">${line.ja}</div>
      <div class="en hidden-answer">${line.en}</div>
      <div class="small">Tap to reveal</div>`;
    card.onclick = ()=> card.querySelector(".en").classList.toggle("hidden-answer");
    list.appendChild(card);
  });
}

function setRate(nextRate){
  rate = nextRate;
  document.getElementById("speed06").classList.toggle("active", rate === 0.6);
  document.getElementById("speed08").classList.toggle("active", rate === 0.8);
  document.getElementById("speed10").classList.toggle("active", rate === 1.0);
}

function renderRead(){
  document.getElementById("readMeta").textContent = `${speech.title} / ${speech.stance}`;
  const list = document.getElementById("readList");
  list.innerHTML = "";
  speech.lines.forEach((line,i)=>{
    const card = document.createElement("div");
    card.className = "read-line" + (i === currentReadIndex ? " active" : "");
    card.id = `read-line-${i}`;
    card.innerHTML = `
      <div class="small">Line ${i+1} / ${line.cue}</div>
      <div class="read-en">${line.en}</div>
      <button onclick="speakLine(${i})">▶ この文を再生</button>
    `;
    list.appendChild(card);
  });
}

function getEnglishVoice(){
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en")) || null;
}

function speakText(text, onend, cancelFirst=true){
  if(cancelFirst) window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = rate;
  utter.pitch = 1;
  const voice = getEnglishVoice();
  if(voice) utter.voice = voice;
  utter.onend = () => {
    if(onend) onend();
  };
  utter.onerror = () => {
    if(onend) onend();
  };
  window.speechSynthesis.speak(utter);
}

function speakLine(i){
  isPlayingAll = false;
  currentReadIndex = i;
  renderRead();
  const el = document.getElementById(`read-line-${i}`);
  if(el) el.scrollIntoView({behavior:"smooth", block:"center"});
  speakText(speech.lines[i].en, () => {
    currentReadIndex = -1;
    renderRead();
  }, true);
}

function playAll(){
  stopSpeaking(false);
  isPlayingAll = true;
  playQueue = speech.lines.map((_,i)=>i);
  playNextInQueue();
}

function playNextInQueue(){
  if(!isPlayingAll || playQueue.length === 0){
    currentReadIndex = -1;
    isPlayingAll = false;
    renderRead();
    return;
  }
  const i = playQueue.shift();
  currentReadIndex = i;
  renderRead();
  const el = document.getElementById(`read-line-${i}`);
  if(el) el.scrollIntoView({behavior:"smooth", block:"center"});
  speakText(speech.lines[i].en, () => {
    setTimeout(playNextInQueue, 350);
  }, false);
}

function stopSpeaking(reset=true){
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
  }
  isPlayingAll = false;
  playQueue = [];
  if(reset){
    currentReadIndex = -1;
    renderRead();
  }
}

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}


function formatTime(sec){
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  return `${m}:${s}`;
}

function renderExam(){
  document.getElementById("examMeta").textContent = `${speech.title} / ${speech.stance}`;
  document.getElementById("timer").textContent = formatTime(timeLeft);
}

function startTimer(){
  stopTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    renderExam();
    if(timeLeft <= 0){
      stopTimer();
      stopExamRecording();
      alert("Time's up!");
    }
  }, 1000);
}

function stopTimer(){
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function resetTimer(){
  stopTimer();
  timeLeft = 120;
  renderExam();
}

async function startExamRecording(){
  try{
    if(mediaRecorder && mediaRecorder.state === "recording") return;
    audioChunks = [];
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => {
      if(e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      if(recordingUrl) URL.revokeObjectURL(recordingUrl);
      recordingUrl = URL.createObjectURL(blob);
      const audio = document.getElementById("recordingAudio");
      audio.src = recordingUrl;
      audio.style.display = "block";
      stream.getTracks().forEach(track => track.stop());
    };
    resetTimer();
    mediaRecorder.start();
    startTimer();
  }catch(e){
    alert("マイクの使用が許可されませんでした。ブラウザの設定を確認してください。");
  }
}

function stopExamRecording(){
  stopTimer();
  if(mediaRecorder && mediaRecorder.state === "recording"){
    mediaRecorder.stop();
  }
}

function playRecording(){
  const audio = document.getElementById("recordingAudio");
  if(audio.src) audio.play();
}

function clearRecording(){
  const audio = document.getElementById("recordingAudio");
  audio.pause();
  audio.removeAttribute("src");
  audio.style.display = "none";
  if(recordingUrl) URL.revokeObjectURL(recordingUrl);
  recordingUrl = null;
  audioChunks = [];
}

initCategories();
initTopics();
updateHeader();
setDisplayMode("jp");
setRate(1.0);
</script>
</body>
</html>
